version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mysql-db-api-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - intranet_produccion_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: intranet_produccion_api
    restart: unless-stopped
    expose:
      - "8200"
    env_file:
      - .env
    volumes:
      - /home/ec2-user/.aws:/root/.aws:ro
    networks:
      - intranet_produccion_network
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy-api-produccion
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - intranet_produccion_network
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: certbot-api-produccion
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  mysql_data:

networks:
  intranet_produccion_network:
    external: true